# OSCity - Kernel Guardian Dialogue
# Each entry is a list of lines spoken one after another.
# Placeholders: {journey}, {pfn}, {vpn}, {result}, {did_not}, {floor}, {slot}, {button}, {file}

rooms:
  terminal:
    initial_spawn:
      - "Greetings, traveler. I am the Kernel Guardian, architect of this digital realm."
      - "You have been chosen to replace me in maintaining the delicate balance of OSCity."
      - "To your left: the Departure Gate, step inside and your journey through OSCity begins."
      - "To your right: the Assessment Room, a short quiz that helps me point you to the right journey."
      - "If you have some previous knowledge, I recommend starting with the quiz. It will tell you exactly where to begin."
      - "If you don't then you can head to the Departure Gate."
      - "If you have FOMO, you can still do it to test your knowledge after finishing your journeys."
      - "Right-click on me at any time to see what I can help you with."

    path_select: 
      - "Welcome back, traveler. The paths of OSCity await your command."
      - "Choose your journey path below. I will guide you from there."

    returning_quiz_done:
      - "Welcome back. Head to the Departure Gate to choose your next journey."
      - "You can reattempt the Assessment Quiz at any time from the Assessment Room."
      - "Right-click on me whenever you need help."

    returning_no_quiz:
      - "Welcome back. Head to the Departure Gate to choose your next journey."
      - "The Assessment Room is to your right is still available if you want to try the quiz."
      - "Right-click on me whenever you need help."

    journey_selected:
      - "Excellent. Your journey is {journey}."
      - "Open the chest and you will find a map with your instruction."
      - "Take the map, it is your guide through the journey."
      - "One last thing: there are achievements hidden throughout OSCity. Earn them by completing journeys, answering correctly, and exploring concepts."
      - "You can check your progress and what each one requires by right-clicking me at any point during your journey."
      - "When you're ready, press the button to proceed to OSCity."
      - "Do not forget the map!"

    journey_random:
      - "Fate has spoken. I have chosen your challenge. It is {journey}."
      - "You did not choose this path. It has chosen you."
      - "Open the chest and you will find a map with an instruction."
      - "Take the map—it is your guide through the journey."
      - "When you're ready, press the button to proceed to OSCity."
      - "Do not forget the map!"

    returning_journey_selected:
      - "Your journey is {journey}."
      - "Take the map from the chest and press the button when you're ready."

    returning_journey_random:
      - "Fate has spoken again. Your challenge is {journey}."
      - "Take the map from the chest and press the button when you're ready."

    journey_ordered:
      - "Your next journey in the sequence is: {journey}."

  departure_gate:
    quiz_done:
      - "Welcome back, traveler. The Assessment Quiz has given me a clear picture."
      - "Below you will find all seven journeys, your quiz results are shown next to each."
      - "The ones marked with a star are where you struggled most. I recommend starting there."
      - "But the choice is yours. You may revisit any journey as many times as you wish."
    no_quiz_warning:
      - "I see you haven't taken the Assessment Quiz yet."
      - "If you have some previous knowledge, I recommend taking it, it's in the Assessment Room to your right."
      - "The quiz will tell you exactly what are your weak points."
      - "If you're a beginner, I have tailored 'All journeys in order' to take you from the basics to advanced scenarios."
    ready:
      - "Your map is in the chest, take it with you."
      - "One last thing, there are achievements hidden throughout OSCity. Earn them by completing journeys, answering correctly, and exploring concepts."
      - "You can check your progress and what each one requires by right-clicking me at any point during your journey."
      - "When you are ready, press the button to enter OSCity."
      - "Good luck, {player}."

  end_terminal:
    arrival:
      - "Congratulations, {player}! You have completed {journey}."
      - "You navigated virtual memory successfully—from address translation to physical access."
      - "RECOMMENDED: Press the SUMMARY button to review what happened in this journey."
      - "There are other journeys to explore. Each one reveals something new."
      - "When you are ready, press the button on the right to return to the starting terminal."

    arrival_returning:
      - "Well done, {player}. {journey} complete."
      - "RECOMMENDED: Press the SUMMARY button to review what happened in this journey."
      - "When you are ready, press the button on the right to return to the starting terminal."

    summary_lucky:
      - "Journey Summary: TLB hit"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, you matched your VPN to a chest tag, that's a cache hit."
      - "The chest held the PFN so no page table walk was needed."
      - "You confirmed it's a TLB hit and teleported to the RAM."
      - "In the RAM, you confirmed that your process in mapped to the PFN you got from the TLB chest."
      - "This is the fastest path through virtual memory, most accesses (95-99%) take this route."

    summary_tlb_miss_allow:
      - "Journey Summary: TLB Miss — Allow Access"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN; that's a TLB miss."
      - "You entered the Page Table Library and used your DIR bits to climb to the right floor."
      - "You used your TABLE bits to find the right chest and opened it to read the PTE."
      - "The PTE had PRESENT=1 with valid permissions, this means that the page is in RAM and accessible to your process."
      - "So you selected ALLOW ACCESS in the Permission Chamber."
      - "You teleported to RAM and confirmed your process is mapped to the PFN from the PTE."
      - "The TLB is now updated, future accesses to this page will be fast."

    summary_swapped_out:
      - "Journey Summary: Page Fault - Swapped Out"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN, that is a TLB miss."
      - "You entered the Page Table Library, used your DIR bits to climb to the right floor, and your TABLE bits to find the right chest."
      - "You opened the chest and read the PTE: PRESENT=0 and IN_SWAP=1, the page was not in RAM and had been swapped out to disk."
      - "At the time it was evicted, the dirty bit was set to 1, meaning the page had been modified and the OS had to save it to swap space rather than simply discarding it."
      - "You went to the Disk Room and retrieved the page from swap space."
      - "Back in RAM, a free frame was available, so you placed the page there."
      - "The OS updated the PTE: PRESENT=1 with the new PFN set."
      - "You pressed RETRY INSTRUCTION and the memory access succeeded."

    summary_lazy_loading:
      - "Journey Summary: Page Fault - Lazy Loading"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN, that is a TLB miss."
      - "You entered the Page Table Library, used your DIR bits to climb to the right floor, and your TABLE bits to find the right chest."
      - "You opened the chest and read the PTE: PRESENT=0 and FILE_BACKED=1, the page is file-backed meaning it was either never loaded into RAM, or was previously evicted without modification (DIRTY=0)."
      - "You calculated the PAGE_INDEX using the formula PAGE_INDEX = VA / PAGE_SIZE to find which part of the file to load."
      - "You went to the Disk Room and retrieved the file-backed page from disk."
      - "Back in RAM, there was no free frame, so you ran the Clock Algorithm to find a victim."
      - "You walked the circle, flipping USE BITs off until you found one already off, then evicted that frame to disk."
      - "You placed the retrieved page into the freed frame, and the OS updated the PTE: PRESENT=1 with the new PFN set."
      - "You pressed RETRY INSTRUCTION and the memory access succeeded."

    summary_lazy_allocation:
      - "Journey Summary: Page Fault - Lazy Allocation"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN, that is a TLB miss."
      - "You entered the Page Table Library, used your DIR bits to climb to the right floor, and your TABLE bits to find the right chest."
      - "You opened the chest and read the PTE: PRESENT=0 and ANON=1, the page is anonymous meaning the OS promised this memory to the process but deferred the actual allocation until now."
      - "The OS mapped the process to the zero frame, a read-only pre-zeroed page, and updated the PTE: PRESENT=1, pointing to the zero frame."
      - "The process then tried to write, but the page was read-only, so RAM was checked for a free frame."
      - "RAM was full, so you ran the Clock Algorithm to find a victim frame, walking the circle and flipping USE BITs off until finding one already off, then evicting it."
      - "The OS allocated the freed frame, zeroed it, and mapped it to your process."
      - "You wrote in the book to represent the process writing to the new page."
      - "The OS updated the PTE: PRESENT=1, PFN set, and WRITE=1."
      - "You pressed RETRY INSTRUCTION and the memory access succeeded."

    summary_pure_cow:
      - "Journey Summary: Protection Fault - Copy-on-Write"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN, that is a TLB miss."
      - "You entered the Page Table Library, used your DIR bits to climb to the right floor, and your TABLE bits to find the right chest."
      - "You opened the chest and read the PTE: PRESENT=1 but WRITE=0, the page is in RAM but marked read-only because it is shared between processes."
      - "The process attempted a write, so you selected PROTECTION FAULT in the Permission Chamber."
      - "In RAM, the OS allocated a new private frame and copied the original page contents into it."
      - "You took the book from the new frame, wrote what the process wanted, and placed it back."
      - "The OS updated the PTE and TLB to point to the new frame with WRITE=1."
      - "You pressed RETRY INSTRUCTION and the write succeeded."

    summary_permission_violation:
      - "Journey Summary: Permission Violation (Segmentation Fault)"
      - "You converted your hex virtual address to binary and split it into VPN and OFFSET."
      - "In the TLB Tower, none of the chest tags matched your VPN, that is a TLB miss."
      - "You entered the Page Table Library, used your DIR bits to climb to the right floor, and your TABLE bits to find the right chest."
      - "You opened the chest and read the PTE: USER=0, the page belongs to kernel-only memory and is not accessible to user processes."
      - "You selected SEGMENTATION FAULT in the Permission Chamber."
      - "The process was terminated immediately. There is no retry and no recovery."
      - "This is the only journey that ends without a successful memory access."

  tlb_room:
    at_spawn:
      - "Welcome to the TLB Tower—the Translation Lookaside Buffer Chamber."
      - "This room is the CPU's fastest memory cache. Before you stands a magnificent tower—the Two-Level Page Table Library. We will get to it later, don't worry."
      - "Over these chests you can find a Virtual Page Number (VPN) tag."
      - "These will help you find the matching Physical Frame Number (PFN) tag, if you are 'Lucky'."
      - "Right now all you have is a Virtual Address (VA) in Hexadecimal, but the tags are in binary. What can you do to 'calculate' it?"

    after_calculator:
      - "Good. Your address is now broken down."
      - "The chests in this room each have a tag above them."
      - "Look at your map, then look at the tags. What do you conclude?"

    after_hit_miss:
      - "You have selected {result}—so you believe that the TLB {did_not} cache the PFN mapping to a VPN?"

    after_hit_quiz_lucky:
      - "Excellent! You found the TLB entry. The Physical Frame Number is {pfn}."
      - "Now travel to RAM and locate this frame to confirm it's mapped to your process."
      - "Press the button to teleport to RAM."

    after_hit_quiz_non_lucky:
      - "No, you don't see your VPN on any of the chests around you."
      - "This means it's a TLB Miss."
      - "Try again. Press the MISS button."

    after_miss_quiz_non_lucky:
      - "Excellent! This is a case of a TLB miss—the mapping was not cached."
      - "Now you can enter the Two-Level Page Table, but for the door to open, you must answer this question:"

    after_miss_correct:
      - "Correct! The page table door button is now enabled."
      - "Before you enter, let me brief you on what lies ahead."
      - "You are about to walk through the two-level page table."
      - "Instead of one giant table with millions of entries, we have a hierarchy:"
      - "  - One Page Directory at the Ground Floor"
      - "  - Three Page Tables on the floors above"
      - "Every process has its own page directory and the Page Table Base Register (PTBR) tells us where to find it."
      - "This way, unused memory regions do not waste space."
      - "Now you may proceed."

    after_miss_quiz_lucky:
      - "No, in this Lucky case, the VPN IS displayed on one of the chests in this room."
      - "Double check the VPN tag and try again."

  calculator_room:
    from_tlb_spawn:
      - "Welcome to the Calculator Chamber. This is where numbers become clear."
      - "Your virtual address needs to be broken down, the signs here will help."
      - "When you have your answer, it will be added to your map."

    from_tlb_after_quiz:
      - "Excellent! Now you may go back to the TLB to continue your journey."

    from_tlb_skip:
      - "The VPN and OFFSET have been added to your map."
      - "Press the button to go back to the TLB room and continue your journey."

    from_lazy_loading_spawn:
      - "Welcome again to the Calculator Chamber."
      - "This time your task is to calculate the page index. The formula and all you need is on your map."
      - "If you want, you can convert the hexadecimal values to binary first, or simply use them directly."
      - "Just make sure you use the same form of numbers throughout."

    from_lazy_loading_after_quiz:
      - "Let's go back to the Lazy Loading room—I will explain what we just did."
    from_lazy_loading_skip:
      - "The page index has been added to your map."
      - "Press the button to go back to the Lazy Loading room and continue your journey."

  page_table_library:
    entrance: # might remove
      - "You are about to walk through the two-level page table."
      - "But wait—how will we know which page table is ours?"
      - "The Page Table Base Register (PTBR) points to this process's page directory."
      - "The PTBR contains the address of where YOUR page table starts."
      - "It's like a bookmark that says: 'This process's memory mappings begin here.'"
      - "Every process has its own PTBR, so every process has its own page table."
      - "You are now at the entrance to the Two-Level Page Table Library."
      - "Remember: The TLB is the CPU's fast cache. It doesn't always have the answer."
      - "When the TLB missed, we must find the answer the hard way—the Page Table."
      - "The Page Table is like a massive filing system. It knows the mapping of every virtual page to its physical frame."
      - "But this library is organised in LEVELS to save space."
      - "Instead of one giant table with millions of entries, we have a hierarchy:"
      - "  - One Page Directory at the Ground Floor"
      - "  - Three Page Table above it"
      - "This way, unused memory regions don't waste space."
      - "Enter when you're ready."

    page_directory:
      - "Welcome to the Ground Floor of the Two-Level Page Table Library."
      - "This is the Page Directory."
      - "Your VPN is split here: the first 2 bits select the page table (DIR), the last 2 select the entry (TABLE)."
      - "Match your DIR bits to one of the floors and climb."

    correct_floor:
      - "Welcome to Page Table {floor}."
      - "Each one of these chests represents a Page Table Entry (PTE)."
      - "Look at the signs above each chest. They show: '00', '01', '10', '11'"
      - "Match your TABLE bits (the last 2 bits of your VPN) to find your PTE."
      - "Once you find them, open the chest and retrieve the map inside—that is your PTE."
      - "Keep the PTE with you. It contains crucial information for the next steps of your journey."

    wrong_floor:
      - "You are not on the correct floor. This is Page Table Floor {floor}."

    tp_permission_chamber:
      - "I know these terms can be confusing. You can ask me about them in the next room."
      - "For now, press the button to take you to the Permission Chamber. I will meet you there."

  permission_chamber:
    at_spawn:
      - "Welcome to the Permission Chamber—the judgment hall of virtual memory."
      - "The Page Table Walk is complete. Now we must decide: what does the PTE tell us?"
      - "Before you stand four buttons, each representing a different outcome."
      - "Your task is to examine the PTE and choose wisely."
      - "If you want, you can ask me to explain the meaning of each option."

    after_button_press:
      - "You have selected {button}."

    allow_access_proceed:
      - "The teleport button to RAM is now active. Press it to go to RAM and confirm the frame."

    page_fault_subtype_prompt:
      - "Correct! This is a page fault."
      - "The page is not currently in RAM."
      - "Now must determine which type of page fault this is."
      - "Look at your PTE again. Which type of page fault is this?"
      - "If you are unsure, I can explain it to you."

    proceed_to_disk:
      - "Correct! This page was swapped out to disk."
      - "Its dirty bit was 1 (it had been modified), so the OS saved it to swap space rather than discarding it."
      - "It needs to be retrieved from a special area called 'Swap Space'."
      - "Fortunately RAM has a free frame this time, the PFN has been added to your map."
      - "Press the button to go to the Disk Room. I will meet you there."

  page_fault_corridor:
    at_enter:
      - "You stand in the Page Fault Corridor—the intersection of memory management outcomes."
      - "You've determined that a page fault has occurred."
      - "Before you stand two doors. Choose the one you selected in the Permission Chamber."

  lazy_allocation_room:
    at_enter:
      - "Welcome to the Lazy Allocation room."
      - "Here, pages are born from nothing."
      - "A page was requested, but no memory was pre-allocated."
      - "Now, we must act."
      - "Before you stand two buttons. Which will you choose?"

    allocate_correct:
      - "Correct! The OS allocates the zero frame (frame {pfn}) for your process."
      - "OS maps your process to the shared zero-filled frame, marked read-only."
      - "Oh no, the journey isn't over yet. The process now wants to write! (check the instruction in your map)"
      - "This is a read-only page which causes a protection fault. What should happen?"

    allocate_incorrect:
      - "No! This page never existed on disk."
      - "This is LAZY ALLOCATION. We're creating it fresh, not loading it."
      - "Try again."

    second_visit: # remove this because this is only triggers if they exit and re-enter the room mid-way through
      - "The process wants to write on this page."
      - "Check your map, the instruction has changed."
      - "But look at your PTE. Something about this page is not quite normal."
      - "The kernel has three choices. Which is correct?"

    second_visit_correct:
      - "That's correct!"
      - "Now press the button to teleport to the COW room."

    second_visit_incorrect:
      - "That is incorrect. Try again."

  cow_room:
    at_spawn:
      - "Welcome to the Copy-on-Write room."
      - "You've attempted to write to a page that was shared and read-only."
      - "Before you stand two buttons. Which will you choose?"

    allocate_copy_correct:
      - "Perfect! You understand COW."
      - "A new frame {pfn} has been allocated and the data copied."
      - "Now go to RAM to see your private copy. You can now write to this page freely."
      - "Press the button to teleport to RAM."

    allocate_copy_correct_lazy_alloc:
      - "Correct! The OS needs to allocate a new private frame for you."
      - "Head to RAM to see if a new copy was created."
      - "Press the button to teleport to RAM."

    terminate_incorrect:
      - "No! Terminating the process is too harsh."
      - "Copy-on-Write allows the write by creating a private copy. The process can continue."
      - "Try again."

  lazy_loading_room:
    at_enter:
      - "Welcome to the Lazy Loading room."
      - "A page fault occurred on a file-backed page—one that exists on disk."
      - "Now you must load it into RAM."
      - "But first—you need to know WHICH part of the file to load."
      - "The page is somewhere in a file on disk. But where?"
      - "Look around and try to find clues, then head to the Calculator Room."

    after_calculator:
      - "Welcome back. Let me explain why we needed the page index."
      - "You have a file on disk. That file is large and contains many pages."
      - "PAGE_INDEX tells you which page of the file you need."
      - "Now head to the Disk Room when you are ready."

  disk_room:
    at_spawn:
      - "Welcome to the Disk Storage Chamber."
      - "You stand before vast storage—where pages that can't fit in RAM are kept."
      - "You see organised chests: File blocks labeled A through Z, and Swap space with numbered slots."

    lazy_loading_prompt:
      - "You're loading a FILE-BACKED page."
      - "Find the file name that appears on your map in the FILE TABLE."
      - "Go to the corresponding disk block (A, B, C, etc.) and retrieve the page you need."
      - "PAGE_INDEX tells you which one."
      - "Once you have the page, bring it to RAM for the process to access it."
      - "Press the button to teleport to RAM."

    swap_retrieval_prompt:
      - "Go to the SWAP SPACE section."
      - "Find the slot number from your PTE."
      - "Retrieve the page from that slot."

    after_book_retrieved:
      - "Now you must bring it to RAM for the process to access it."
      - "Press the button to teleport to RAM."

  ram_room:
    found_frame:
      - "Welcome to RAM—the high-speed memory where active data lives."
      - "Each frame is labeled with its PFN (Physical Frame Number)."
      - "You have found frame {pfn}."
      - "The label shows: 'PFN {pfn}: mapped to your process'"
      - "Press 'Confirm - Process Mapped' to verify."

    found_frame_from_pt:
      - "Welcome to RAM—the high-speed memory where active data lives."
      - "Your TLB missed, but the page table walk found the mapping: PFN {pfn}."
      - "Access was granted—now confirm this frame is mapped to your process."
      - "Press 'Confirm - Process Mapped' to verify."

    after_confirm:
      - "Excellent! Frame {pfn} is confirmed to be mapped to your process."
      - "Press 'Finish' to complete this journey."

    ram_full_need_swap:
      - "Let's try to find you an empty frame to write on your page."
      - "OH NO! The RAM is full, we need to evict one of the frames, but we can't do that randomly!"
      - "Head to the swap district and I will inform you on what to do."
      - "Press 'Continue' to proceed."

    after_cow_pure:
      - "You've just created a private copy in frame {pfn}."
      - "This frame is now exclusive to your process."
      - "The OS has copied the original page contents to the new frame."
      - "Take the book from frame {pfn} chest."
      - "You can now write what the process wants to this page."
      - "Place the book back in the chest when done."

    book_placed_teach_cow:
      - "Since you're still learning, I'll let that pass!"
      - "But here's what the OS actually does when it writes 'hey' to address {va}:"
      - "The frame holds 16 bytes, numbered 0 to 15."
      - "The OFFSET bits (0100 = 4) point to byte 4."
      - "So the correct page looks like this:"
      - "0 0 0 0 h e y 0"
      - "0 0 0 0 0 0 0 0"
      - "Each slot is one byte. 'hey' starts at position 4."
      - "The memory state has been updated."
      - "Press 'RETRY INSTRUCTION' to proceed."

    book_placed_teach_lazy_alloc:
      - "Since you're still learning, I'll let that pass!"
      - "But here's what the OS actually does when it writes 'hey' to address {va}:"
      - "The frame holds 16 bytes, numbered 0 to 15."
      - "The OFFSET bits (0101 = 5) point to byte 5."
      - "So the correct page looks like this:"
      - "0 0 0 0 0 h e y"
      - "0 0 0 0 0 0 0 0"
      - "Each slot is one byte. 'hey' starts at position 5."
      - "The OS has updated the PTE: PRESENT is now 1 and the PFN is set."
      - "Press 'RETRY INSTRUCTION' to proceed."


    retry_instruction_page_fault:
      - "The OS has updated the PTE: PRESENT is now 1 and the PFN is set."
      - "The page is now in RAM and accessible to the process."
      - "The faulting instruction will be restarted, this time it will succeed."
      - "Press 'RETRY INSTRUCTION' to proceed."

    instruction_succeeded:
      - "The instruction has succeeded!"
      - "Press 'Finish' to complete this journey."

    after_swap_for_lazy_loading:
      - "Frame {pfn} is now free."
      - "Load the page you retrieved from disk into this frame's chest."

    after_swap_for_lazy_alloc:
      - "OS allocates frame {pfn} for your process."
      - "The OS copies the zero frame's contents into your new private frame: 16 zeros, one per byte."
      - "Open chest {pfn} and find a book with 16 zeros inside."
      - "Write 'hey' in it as the process requested."
      - "Place the book back in the chest when done."

    from_disk_swap_out:
      - "Welcome to RAM, the high-speed memory where active data lives."
      - "Each frame is labeled with its PFN (Physical Frame Number)."
      - "You have retrieved the page from the disk. Now load it into memory."
      - "Place the book in any free RAM chest to load the page into a frame."


  swap_district:
    at_spawn:
      - "Welcome to the Swap District."
      - "The RAM is full. One frame must be evicted to make room."
      - "But the kernel does not evict randomly, it uses the second chance algorithm."
      - "Each frame around this circle holds a clue about how recently it was used."
      - "Walk the circle starting from 0x01 (the pink house) to 0x06 and figure out which one should be evicted."
      - "If you are not familiar with the second chance algorithm, ask me for a hint."

    victim_found:
      - "USE BIT is already OFF."
      - "This is the victim. Press the button again to evict it to disk."

    after_eviction:
      - "Frame {pfn} has been swapped out to disk."
      - "Its dirty bit was 1: the page had been written to, so the OS saved it to swap space rather than discarding it."
      - "If the dirty bit were 0, the OS could have simply discarded it, since no changes were made."
      - "RAM now has a free frame."
      - "Return to RAM and place your new page there."
      - "Press the button in the middle to teleport back to RAM."

# ─── Hints ────────────────────────────────────────────────────────────────────
hints:
  terminal:
    before_entering:
      - "Look around you. There are two rooms."
      - "The Departure Gate (left) is where you start your journey."
      - "The the Assessment Room (right) has a short quiz that helps me point you to the right journey."
      - "I recommend starting with the quiz if you aren't a beginner."
    
    end_terminal:
      - "I highly recommend that you read the summary for your jounrey by pressing the button on your left."
      - "If you have done that, press the button on your right to teleport to the start."

  tlb_room:
    before_calculator:
      - "For now, your task is simple: take the virtual address I've given you and calculate its components in the Calculator Room."
      - "There is a path to it somewhere in this hall."

    after_calculator_lucky:
      - "Your VPN is the first 4 bits of your binary address."
      - "If your VPN appears on a sign (tag) above one of the chests, the TLB cached it, that is a hit."

    after_calculator_non_lucky:
      - "Your VPN is the first 4 bits of your binary address."
      - "If your VPN does not appear on any sign (tag) over the chests, the TLB has no entry for it, that is a miss."

    tlb_hit_quiz_done:
      - "The Go to RAM button is in the same spot where the Hit button was, next to the Miss button."

    before_enter_page_table:
      "Press the button next to the door of the giant book tower to get to your next step."


  calculator_room:
    from_tlb_hint1:
      - "Your binary address is split into two parts: VPN (first 4 bits) and OFFSET (last 4 bits)."
      - "Convert your hex VA to binary, then divide it at position 4."

    from_tlb_hint2:
      - "Open the chest and take a book. Write the VA you have, then place it in the metal cone. The answer will be added to your map."

    from_tlb_hint3:
      - "You can press the button to skip, but it's recommended you do the calculations yourself."

    from_tlb_after: # tlb and lazy loading
      - "Press the button to go back and I will help you there."

    from_lazy_loading:
      - "Your goal here is to calculate the PAGE_INDEX—which page of the file to load."
      - "Use the formula on the sign: PAGE_INDEX = VA / PAGE_SIZE."
      - "The values are already on your map. Write your VA in the book, drop it in the hopper, and the answer will be added to your map."

  page_table_library:
    page_directory:
      - "Find the correct page table (floor) using your DIR bits (first 2 bits of VPN)."

    correct_floor:
      - "Find the correct chest on that floor using your TABLE bits (last 2 bits of VPN)."
      - "Open that chest and retrieve your PTE (Page Table Entry)."

    wrong_floor:
      - "Check your TABLE bits again—they are the last 2 bits of your VPN."
    
    acquired_pte:
      - "Press the button to make your decision in the Permission Chamber."

  permission_chamber:
    decision:
      - "Think of it like a decision tree:"
      - "  - Is PRESENT = 1 (is it in RAM)? If no, it's a PAGE FAULT."
      - "  - If yes, are you accessing kernel memory from user mode (USER=0)?"
      - "     - If yes, it's a SEGMENTATION FAULT."
      - "  - If no, do READ/WRITE bits allow your operation (READ=1/WRITE=1)?"
      - "     - If yes, it's ALLOW ACCESS."
      - "     - If no, it's a PROTECTION FAULT."
      - "Hint: Check what the instruction is trying to do (read/write) and compare it to the permissions in the PTE."
    page_fault_type:
      - "LAZY ALLOCATION has (ANON=1)"
      - "LAZY LOADING has (FILE_BACKED=1)"
      - "SWAPPED-OUT PAGE has (IN_SWAP=1)"

  page_fault_corridor:
    lost:
      - "Choose the room that matches what you selected in the Permission Chamber."

  lazy_allocation_room:
    first_visit:
      - "The page never existed before—it's being created fresh."
      - "Therefore, you need to ALLOCATE a new frame."
      - "The OS will map the process to the shared Zero Frame as a placeholder."
      - "Swapping from disk doesn't make sense for a page that never existed."

    second_visit:
      - "The zero page is marked read-only because multiple processes share the same zero-filled template."
      - "Even though this frame is now yours, the kernel marked it read-only as an optimisation."
      - "When you try to write, the read-only flag triggers a special kernel mechanism."
      - "Think about what the kernel needs to do before the write can proceed."
    
    go_to_cow:
      - "Press the button to COW and I will meet you there."

  cow_room:
    lost:
      - "You wanted to write to a shared, read-only page."
      - "The kernel has two choices:"
      - "  1. Give you a private copy to be able to write on it (COW)."
      - "  2. Deny the write and terminate (too harsh...)."
    
    go_to_ram:
      - "Press the button to the RAM and I will meet you there."

  lazy_loading_room:
    clues:
      - "The Page Size value have already been added to your map, you will find the same formula in the calculator room."
    after_calculator:
      - "You have calculated the page index. Now you need to fetch that page from disk."
      - "Press the button in this room to travel to the Disk Room and retrieve the file."

  disk_room:
    lazy_loading:
      - "Your instruction told you: 'load {file} {address}'"
      - "FILE name → Look up in FILE TABLE → Get starting disk block (A, B, C, etc.)"
      - "ADDRESS → Already calculated PAGE_INDEX (from earlier)"

    lazy_loading_after_book: # and swapped out
      - "Press the button to teleport to the RAM."

    swap_out:
      - "Your PTE contains: IN_SWAP=1, SWAP_SLOT={slot}"
      - "Go directly to the SWAP SPACE section."
      - "Find the numbered slot matching SWAP_SLOT: {slot}"
      - "Open that slot and retrieve your page."

  ram_room:
    general:
      - "Look at the frame numbers (PFN) on the walls."
      - "Find frame {pfn}."
      - "Read the label on that frame, it will tell you what process owns it."

    write:
      - "Your map shows the instruction the process is executing, e.g. 'write 0x64 hey'."
      - "The last word is the value to write, in this example, that is 'hey'."
      - "Open the chest, take out the book, and write that value."
      - "PUT THE BOOK BACK in the chest before pressing any buttons."
    
    swap:
      - "Press the button to go to the Swap District."
    
    place_book:
      - "Place the retrieved page you got from the disk into the free frame."
    
    retry_instruction:
      - "Press retry instruction to update the memory state."
    
    finish:
      - "You have completed your task! Press Finish to go to the End Terminal."

  swap_district:
    lost:
      - "The kernel uses the CLOCK algorithm to find a victim:"
      - "  1. Start from the pink house."
      - "  2. Follow the arrows to walk around the circle like clock hands."
      - "  3. Each frame (house) has a USE BIT symbolised as a red torch."
      - "  4. If USE BIT is ON: flip it OFF (by pressing the button next to it) and move on."
      - "  5. If USE BIT is OFF: this is your victim!"
    
    victim_found:
      - "You have found the victim! Press on the same button again to evict it."
    
    victim_evicted:
      - "The frame has been successfully evicted! Press the button in the middle of the platform to continue."

# Feedback for correct answers
feedback:
  allow_access_correct:
    - "Correct! The kernel allows this memory access to proceed."
  segfault_correct:
    - "Correct! This is a segmentation fault."
    - "The process is trying to access memory outside its allowed boundaries."
    - "This is a fatal error—the process must be terminated."
  protection_fault_correct:
    - "Correct! This is a protection fault."
    - "The page exists, but the requested operation is not allowed."
  lazy_allocation_correct:
    - "Correct! This is lazy allocation."
    - "The page is anonymous and needs to be created fresh."
    - "You may now proceed to the Page Fault Corridor. I will meet you there."
  lazy_loading_correct:
    - "Correct! This is lazy loading."
    - "The page is file-backed and needs to be loaded from disk."
    - "You may now proceed to the Page Fault Corridor. I will meet you there."

# Concept explanations (player asks 'explain a concept')
explanations:
  tlb:
    hit: "The VPN found is in cache. This is the fastest scenario as it requires only one CPU cycle."
    miss: "The VPN is not found in cache. So must walk page table. It's slower but recoverable."
    location: "TLB lives in the CPU/MMU (not RAM). It's a special hardware with limited space (64-1024 entries)."
    importance: "Speeds up memory access. Most accesses hit cache (95-99%). Alternative to slow page table walks."

  address:
    vpn: "Virtual Page Number: the first 4 bits of the virtual address (VA). It indicates which page you're accessing. Used to find matching PFN."
    offset: "It's the last 4 bits of the virtual address (VA). It indicates the position within the page. Stays unchanged when translating VA to PA."
    hex_to_bin: "TLB works in binary. VAs come in hex (human-readable). Must convert for TLB matching."

  page_table:
    why_two_level: "Space efficiency—only allocate for used regions. Saves massive memory."
    ptbr: "CPU register pointing to page directory. A process-specific bookmark."
    isolation: "Each process has different virtual address spaces. Different mappings. Memory isolation and security."
    vpn_split: "DIR (first 2 bits) = which page table (floor). TABLE (last 2 bits) = which chest."
    dir_range: "In this world, DIR uses entries 01-11. This is a simplification for the game only, in real systems, 00 is also included."
    pte: "Metadata about ONE page. PRESENT, READ, WRITE, PFN, etc. Contains all page information."

  permission_chamber:
    allow_access: "Allow access: The page is in the RAM and its permission bits allow the kernel to proceed with the memory access."
    page_fault: "Page fault: The kernel cannot fulfill the memory access right now and must intervene. The page either doesn't exist in memory yet, or was evicted and needs to be brought back."
    segfault: "Segmentation fault: The process tried to access a kernel page from user mode."
    protection_fault: "Protection fault: The process is trying to access the page, but something about the access is not allowed—either permission bits deny it, or the page is marked with special protection."
    lazy_allocation: "Lazy allocation: The page is anonymous and needs to be created fresh."
    lazy_loading: "Lazy loading: The page is file-backed and needs to be loaded from disk."
    swapped_out: "Swapped out: The page was evicted to disk and needs to be retrieved."
    write_1_0: "Write = 1: The process has permission to write to this page. \nWrite = 0: The process cannot write to this page."
    read_1_0: "Read = 1: The process has permission to read from this page. \nRead = 0: The process cannot read from this page."
    read_only_page: "Read-only page: A page with Read = 1 and Write = 0. \nThe process can read the data but any write attempt will trigger a fault."
    user_1: "User = 1: The page can be accessed when the CPU is in user mode. \nUser = 0: The page cannot be accessed in user mode so attempting to access will trigger a fault."  
    kernel_1: "Kernel = 1: The page can be accessed when the CPU is in kernel mode.\nKernel = 0: The page cannot be accessed in kernel mode. Attempting to access will trigger a fault, though this is rare in real systems since the kernel typically has access to all memory."
    currect_mode: "The CPU operates in either user mode or kernel mode. \nBut I haven't fully tursted you yet, so you will only operate in user mode."
    permission_bits: "Permission bits: Flags in the page table entry that control how a page can be accessed. Common permission bits include READ, WRITE, USER, and KERNEL."

  memory:
    lazy_allocation_what: "Strategy where kernel doesn't allocate memory until needed. Page is anonymous and created fresh. Saves space because only used memory is allocated."
    lazy_allocation_why: "Massive waste if allocated upfront (4GB allocated, 10MB used). Limits concurrent processes. Lazy allocation is essential."
    zero_page_readonly: "The zero page is read-only because it's shared by multiple processes. If a process needs to write, copy-on-write (COW) will allocate a private copy first."
    lazy_loading_what: "Strategy where kernel defers loading file pages until needed. Only the accessed page is loaded from disk. Saves startup time and memory."
    page_index: "Think of a book with chapters. PAGE_INDEX = which chapter do you need? The kernel reads only the chapter you need, not the entire book."
    cow_what: "Copy-on-Write: multiple processes share a read-only page. When one writes, the kernel allocates a new frame, copies the data, maps the new frame, and marks it writable."
    swap_what: "Disk storage used as overflow for RAM. Kernel moves less-used pages from RAM to disk to free up space for active pages."
    swap_vs_file: "File storage is permanent and user-managed. Swap space is temporary and kernel-managed—organised by slot number."
    ram_what: "Random Access Memory. Fast primary memory. Nanosecond access. Limited capacity. Volatile. Divided into frames (each = one page size)."
    pfn_why: "1- Identification and retrieval: kernel uses PFN to find pages immediately. \n2- Mapping: PTE stores PFN for VPN→PFN translation. \n3- Management: tracking free/allocated frames."
    clock_algo: "Frames in a circle. Each has a USE BIT (red torch). ON when you pass it = turn it OFF (second chance). OFF when you pass it = that's the victim!"
    zero_frame: "Zero frame: A special shared frame filled with zeros. The page size determines how many zeros: with a 4 bit offset, we get 16 zeros. The OS uses it as a placeholder for newly allocated pages, saving memory by not allocating a private frame until the process actually writes."
    private_frame: "Private frame: A frame that belongs exclusively to one process. The OS allocates a private frame whenever a process needs its own copy of data, for example, when a process wants to write to a read-only page."
    dirty_bit: "Dirty bit: Set to 1 when a page has been written to. When evicting a dirty page, the OS must write it to the swap space in disk first. \nClean pages (dirty = 0) can be discarded immediately since the disk already has the latest copy."
    use_bit: "Use bit: Set to 1 by hardware whenever a page is accessed. The page replacement algorithm checks this bit to determine which pages are actively being used. \nPages with use bit = 0 haven't been accessed recently and are candidates for eviction."
    swap_lights: "The lights turn on after the second round because of context switching. When the OS switches between processes, each process accesses its pages, setting their use bits back to 1."
    zeros_in_copy: "Why are there 16 zeros in the new copy? Because copy-on-write (COW) copies the contents of the original page. Since you were mapped to the zero frame (which holds 16 zeros, one per byte for a 4-bit offset), the OS copied those zeros into your new private frame."

# Guardian meta-responses (instant, no freeze) 
guardian:
  meta:
    guidance_enabled:
      - "Very well. I will guide you from here on."
      - "Guidance is now enabled for the rest of this journey."
    guidance_disabled:
      - "Understood. You walk alone from here."
      - "Guidance is now disabled for the rest of this journey."
    no_explanation:
      - "I don't have an explanation for that yet."
    nothing_to_add:
      - "I have nothing more to add right now."
    chose_alone:
      - "You chose to explore alone, complete the calculation yourself."
