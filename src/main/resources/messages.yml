  all_given_second_chance: "&6[Clock] &eYou have given every frame a second chance."
  walk_again: "&6[Clock] &eWalk the circle again. One frame did not get a second chance..."
  wrong_order: "&6[Clock] &eFollow the direction of the signs! You need to press frame &f{pfn}&e next."
  already_flipped: "&6[Clock] &eYou already flipped Frame &f{pfn}&e's USE BIT. Move on to the next frame."
